<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Daydream Believer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #000;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* This wrapper is what we scale to zoom into the singer's face.
       The transform-origin points at the upper-center of the frame,
       where the singer's face sits. */
    #zoom {
      position: absolute;
      inset: 0;
      transform-origin: 50% 34%;
      transform: scale(1);
      transition: transform 1000ms cubic-bezier(0.16, 0.84, 0.44, 1);
      will-change: transform;
    }

    #stage.zoomed #zoom {
      transform: scale(2.6);
    }

    /* Size the iframe so the 16:9 video always COVERS the screen,
       leaving no black bars in either orientation. */
    #player {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 56.25vw;        /* 16:9 relative to viewport width  */
      min-height: 100vh;
      min-width: 177.78vh;    /* 16:9 relative to viewport height */
      transform: translate(-50%, -50%);
      border: 0;
      pointer-events: none;   /* taps go to #stage, never to YouTube */
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: 9%;
      transform: translateX(-50%);
      z-index: 5;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: clamp(16px, 4.5vw, 26px);
      letter-spacing: 0.02em;
      padding: 0.65em 1.2em;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 999px;
      backdrop-filter: blur(4px);
      pointer-events: none;
      transition: opacity 600ms ease;
      text-align: center;
      user-select: none;
    }

    #hint.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="zoom">
      <iframe
        id="player"
        src="https://www.youtube.com/embed/DFVBaOsWg-k?enablejsapi=1&autoplay=1&mute=1&controls=0&playsinline=1&rel=0&modestbranding=1&iv_load_policy=3&loop=1&playlist=DFVBaOsWg-k"
        title="Daydream Believer"
        allow="autoplay; encrypted-media"
        allowfullscreen
        frameborder="0"
      ></iframe>
    </div>
    <div id="hint">tap anywhere</div>
  </div>

  <script>
    // Load the YouTube IFrame Player API so we can start audio on the
    // user's first tap (browsers block autoplay-with-sound until then).
    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    var player = null;
    var soundOn = false;

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('player', {
        events: {
          onReady: function (e) {
            // Kick off muted autoplay immediately for the classic
            // "it's already playing" effect.
            e.target.mute();
            e.target.playVideo();
          },
          onStateChange: function (e) {
            // Keep it looping even if the loop param is ignored.
            if (e.data === YT.PlayerState.ENDED && player) {
              player.seekTo(0);
              player.playVideo();
            }
          }
        }
      });
    };

    var stage = document.getElementById('stage');
    var hint = document.getElementById('hint');

    function handleTap() {
      // First tap: turn the sound on (the gesture browsers require).
      if (!soundOn) {
        soundOn = true;
        hint.classList.add('hidden');
        try {
          if (player) {
            player.unMute();
            player.setVolume(100);
            player.playVideo();
          }
        } catch (err) { /* API may not be ready yet; retry below */ }
      }

      // Every tap toggles the zoom into the singer's face.
      stage.classList.toggle('zoomed');
    }

    // Retry unmuting once the API is definitely up, in case the very
    // first tap landed before onReady fired.
    stage.addEventListener('click', function () {
      handleTap();
      if (soundOn && player && typeof player.unMute === 'function') {
        player.unMute();
        player.setVolume(100);
      }
    });
  </script>
</body>
</html>
